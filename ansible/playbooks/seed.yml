---
- name: Seed 1000 keys into Redis Cluster
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Create seed script
      copy:
        dest: /tmp/seed.py
        content: |
          import subprocess
          import hashlib
          total = 0
          failed = 0
          masters = {}
          for i in range(1, 1001):
              key = f"key:{i:04d}"
              value = hashlib.sha256(key.encode()).hexdigest()
              result = subprocess.run(
                  ['/usr/local/bin/redis-cli', '-c', '-p', '6379', 'SET', key, value],
                  capture_output=True, text=True
              )
              if 'OK' in result.stdout:
                  total += 1
              else:
                  failed += 1
                  print(f"FAILED: {key} -> {result.stderr}")
          for ip in ['10.10.0.11', '10.10.0.12', '10.10.0.13']:
              result = subprocess.run(
                  ['/usr/local/bin/redis-cli', '-h', ip, '-p', '6379', 'DBSIZE'],
                  capture_output=True, text=True
              )
              masters[ip] = result.stdout.strip()
          print(f"\n=== Seed Summary ===")
          print(f"Total inserted : {total}/1000")
          print(f"Failed         : {failed}")
          print(f"\nDistribution across masters:")
          for ip, count in masters.items():
              print(f"  {ip}:6379 -> {count} keys")
    - name: Run seed script
      command: python3 /tmp/seed.py
      register: seed_result
    - name: Print seed result
      debug:
        msg: "{{ seed_result.stdout }}"
