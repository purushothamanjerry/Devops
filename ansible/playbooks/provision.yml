---
- name: Install and configure Redis on all nodes
  hosts: redis_all
  become: yes
  roles:
    - redis

- name: Form Redis Cluster
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Wait for all Redis nodes to be ready
      wait_for:
        host: "{{ item }}"
        port: 6379
        timeout: 30
      loop:
        - 127.0.0.1

    - name: Form the Redis cluster
      shell: |
        redis-cli --cluster create \
          redis-node-1:6379 \
          redis-node-2:6379 \
          redis-node-3:6379 \
          redis-node-4:6379 \
          redis-node-5:6379 \
          redis-node-6:6379 \
          --cluster-replicas 1 --cluster-yes
      register: cluster_result

    - name: Print cluster formation result
      debug:
        msg: "{{ cluster_result.stdout }}"
