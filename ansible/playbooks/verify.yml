---
- name: Verify 1000 keys in Redis Cluster
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Create verify script
      copy:
        dest: /tmp/verify.py
        content: |
          import subprocess
          import hashlib

          missing = 0
          mismatched = 0
          verified = 0

          for i in range(1, 1001):
              key = f"key:{i:04d}"
              expected = hashlib.sha256(key.encode()).hexdigest()
              result = subprocess.run(
                  ['/usr/local/bin/redis-cli', '-c', '-p', '6379', 'GET', key],
                  capture_output=True, text=True
              )
              actual = result.stdout.strip()
              if not actual:
                  missing += 1
              elif actual != expected:
                  mismatched += 1
              else:
                  verified += 1

          print(f"\n=== Verify Summary ===")
          if missing == 0 and mismatched == 0:
              print(f"PASS — {verified}/1000 keys verified")
          else:
              print(f"FAIL — {missing} keys missing, {mismatched} values mismatched")

    - name: Run verify script
      command: python3 /tmp/verify.py
      register: verify_result

    - name: Print verify result
      debug:
        msg: "{{ verify_result.stdout }}"
