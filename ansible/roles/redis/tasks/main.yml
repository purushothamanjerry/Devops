- name: Install build dependencies
  apt:
    name:
      - build-essential
      - tcl
      - wget
    state: present
    update_cache: yes

- name: Create redis directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /var/lib/redis
    - /var/log/redis
    - /etc/redis

- name: Check current Redis version
  command: /usr/local/bin/redis-server --version
  register: redis_installed
  failed_when: false
  changed_when: false

- name: Show current version
  debug:
    msg: "Current Redis: {{ redis_installed.stdout }}"

- name: Download Redis {{ redis_version }}
  get_url:
    url: "https://download.redis.io/releases/redis-{{ redis_version }}.tar.gz"
    dest: "/tmp/redis-{{ redis_version }}.tar.gz"
    force: yes

- name: Extract Redis {{ redis_version }}
  unarchive:
    src: "/tmp/redis-{{ redis_version }}.tar.gz"
    dest: /tmp/
    remote_src: yes

- name: Compile and install Redis {{ redis_version }}
  shell: |
    cd /tmp/redis-{{ redis_version }}
    make -j$(nproc)
    make install
  args:
    executable: /bin/bash

- name: Verify installed version
  command: /usr/local/bin/redis-server --version
  register: new_version

- name: Show new version
  debug:
    msg: "Installed Redis: {{ new_version.stdout }}"

- name: Deploy redis.conf
  template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    mode: '0644'

- name: Stop existing Redis if running
  shell: pkill redis-server || true
  changed_when: false

- name: Clean old cluster data
  shell: rm -rf /var/lib/redis/*
  changed_when: false

- name: Start Redis directly
  shell: |
    nohup /usr/local/bin/redis-server /etc/redis/redis.conf \
      > /var/log/redis/redis.log 2>&1 &
  async: 0
  poll: 0

- name: Wait for Redis to start
  wait_for:
    port: "{{ redis_port }}"
    host: 127.0.0.1
    timeout: 30

- name: Verify Redis is running
  command: /usr/local/bin/redis-cli -p {{ redis_port }} ping
  register: redis_ping
  retries: 5
  delay: 2
  until: redis_ping.stdout == "PONG"
