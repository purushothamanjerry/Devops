---
- name: Seed keys into Redis Cluster
  hosts: redis-node-1
  become: yes
  vars:
    key_count: 1000
  tasks:
    - name: Create seed script
      copy:
        dest: /tmp/seed.py
        content: |
          import subprocess
          import hashlib
          import sys

          key_count = int(sys.argv[1]) if len(sys.argv) > 1 else 1000

          def redis_cmd(*args):
              r = subprocess.run(
                  ['/usr/local/bin/redis-cli'] + list(args),
                  capture_output=True, text=True
              )
              return r.stdout.strip()

          total = 0
          failed = 0

          for i in range(1, key_count + 1):
              key = f"key:{i:04d}"
              value = hashlib.sha256(key.encode()).hexdigest()
              result = subprocess.run(
                  ['/usr/local/bin/redis-cli', '-c', '-p', '6379', 'SET', key, value],
                  capture_output=True, text=True
              )
              if 'OK' in result.stdout:
                  total += 1
              else:
                  failed += 1
                  print(f"FAILED: {key} -> {result.stderr}")

          # Dynamically discover master nodes from cluster nodes output
          nodes_raw = redis_cmd('-p', '6379', 'cluster', 'nodes')
          masters = {}
          for line in nodes_raw.strip().splitlines():
              parts = line.split()
              if len(parts) < 3:
                  continue
              flags = parts[2]
              if 'master' in flags and 'slave' not in flags:
                  addr = parts[1].split('@')[0]
                  ip = addr.split(':')[0]
                  port = addr.split(':')[1]
                  count = redis_cmd('-h', ip, '-p', port, 'dbsize')
                  masters[addr] = count

          print(f"\n=== Seed Summary ===")
          print(f"Total inserted : {total}/{key_count}")
          print(f"Failed         : {failed}")
          print(f"\nDistribution across masters:")
          for addr, count in masters.items():
              print(f"  {addr} -> {count}")

    - name: Run seed script
      command: "python3 /tmp/seed.py {{ key_count }}"
      register: seed_result

    - name: Print seed result
      debug:
        msg: "{{ seed_result.stdout }}"
