---
- name: Install and configure Redis on all nodes
  hosts: redis_all
  become: yes
  roles:
    - redis

- name: Form Redis Cluster
  hosts: redis-node-1
  become: yes
  tasks:
    - name: Wait for all Redis nodes to be ready
      wait_for:
        host: "{{ item }}"
        port: 6379
        timeout: 60
      loop:
        - 10.10.0.11
        - 10.10.0.12
        - 10.10.0.13
        - 10.10.0.14
        - 10.10.0.15
        - 10.10.0.16

    - name: Check if cluster already formed
      shell: /usr/local/bin/redis-cli -p 6379 cluster info | grep cluster_known_nodes
      register: cluster_check
      changed_when: false

    - name: Form the Redis cluster
      shell: |
        /usr/local/bin/redis-cli --cluster create \
          10.10.0.11:6379 \
          10.10.0.12:6379 \
          10.10.0.13:6379 \
          10.10.0.14:6379 \
          10.10.0.15:6379 \
          10.10.0.16:6379 \
          --cluster-replicas {{ redis_replicas_per_master | default(1) }} --cluster-yes
      register: cluster_result
      when: "'cluster_known_nodes:1' in cluster_check.stdout"


    - name: Wait for cluster to stabilize
      shell: sleep 3

    - name: Verify cluster state
      command: /usr/local/bin/redis-cli -p 6379 cluster info
      register: final_check


    - name: Fail if cluster not ok
      fail:
        msg: "Cluster formation failed! {{ final_check.stdout }}"
      when: "'cluster_state:ok' not in final_check.stdout"

    - name: Enforce deterministic replica assignment (14->11, 15->12, 16->13)
      shell: |
        ID_11=$(/usr/local/bin/redis-cli -h 10.10.0.11 -p 6379 cluster nodes | grep 10.10.0.11: | awk '{print $1}')
        ID_12=$(/usr/local/bin/redis-cli -h 10.10.0.12 -p 6379 cluster nodes | grep 10.10.0.12: | awk '{print $1}')
        ID_13=$(/usr/local/bin/redis-cli -h 10.10.0.13 -p 6379 cluster nodes | grep 10.10.0.13: | awk '{print $1}')
        
        /usr/local/bin/redis-cli -h 10.10.0.14 -p 6379 cluster replicate $ID_11
        /usr/local/bin/redis-cli -h 10.10.0.15 -p 6379 cluster replicate $ID_12
        /usr/local/bin/redis-cli -h 10.10.0.16 -p 6379 cluster replicate $ID_13
      when: "'cluster_known_nodes:1' in cluster_check.stdout"

    - name: Create Phase 1 topology script
      copy:
        dest: /tmp/topology.py
        content: |
          import subprocess
          
          def redis_cmd(*args):
              r = subprocess.run(['/usr/local/bin/redis-cli'] + list(args), capture_output=True, text=True)
              return r.stdout.strip()
              
          nodes_raw = redis_cmd('-p', '6379', 'cluster', 'nodes')
          
          masters = []
          replicas = []
          
          for line in nodes_raw.strip().splitlines():
              parts = line.split()
              if len(parts) < 8: continue
              
              addr = parts[1].split('@')[0]
              flags = parts[2]
              master_id = parts[3]
              link_state = parts[7]
              slots = ' '.join(parts[8:]) if len(parts) > 8 else ''
              
              if 'master' in flags and 'slave' not in flags:
                  masters.append({'addr': addr, 'link': link_state, 'slots': slots, 'id': parts[0]})
              elif 'slave' in flags:
                  master_addr = 'unknown'
                  for l2 in nodes_raw.strip().splitlines():
                      p2 = l2.split()
                      if p2[0] == master_id:
                          master_addr = p2[1].split('@')[0]
                  replicas.append({'addr': addr, 'link': link_state, 'master': master_addr})
                  
          masters.sort(key=lambda x: x['addr'])
          replicas.sort(key=lambda x: x['addr'])
          
          print("Cluster Topology:")
          for m in masters:
              print(f"  {m['addr']:<15}  [master]  status: {m['link']:<10} slots: {m['slots']}")
          for r in replicas:
              print(f"  {r['addr']:<15}  [replica] status: {r['link']:<10} replicating: {r['master']}")

    - name: Run topology script
      command: python3 /tmp/topology.py
      register: topo_out

    - name: Print final cluster topology
      debug:
        msg: "{{ topo_out.stdout_lines }}"
