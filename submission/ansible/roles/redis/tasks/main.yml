- name: Install build dependencies
  apt:
    name:
      - build-essential
      - tcl
      - wget
    state: present
    update_cache: yes

- name: Create redis directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /var/lib/redis
    - /var/log/redis
    - /etc/redis

- name: Check current Redis version
  command: /usr/local/bin/redis-server --version
  register: redis_installed
  failed_when: false
  changed_when: false


- name: Parse installed version
  set_fact:
    installed_version: "{{ redis_installed.stdout.split('v=')[1].split(' ')[0] if 'v=' in redis_installed.stdout else '' }}"

- name: Download Redis {{ redis_version }}
  get_url:
    url: "https://download.redis.io/releases/redis-{{ redis_version }}.tar.gz"
    dest: "/tmp/redis-{{ redis_version }}.tar.gz"
    force: yes
  when: installed_version != redis_version

- name: Extract Redis {{ redis_version }}
  unarchive:
    src: "/tmp/redis-{{ redis_version }}.tar.gz"
    dest: /tmp/
    remote_src: yes
  when: installed_version != redis_version

- name: Compile and install Redis {{ redis_version }}
  shell: |
    cd /tmp/redis-{{ redis_version }}
    make -j$(nproc)
    make install
  args:
    executable: /bin/bash
  when: installed_version != redis_version
  notify: Restart Redis

- name: Verify installed version
  command: /usr/local/bin/redis-server --version
  register: new_version


- name: Deploy redis.conf
  template:
    src: redis.conf.j2
    dest: /etc/redis/redis.conf
    mode: '0644'
  notify: Restart Redis

- name: Stop Redis and clean data for new installation
  shell: |
    pkill redis-server || true
    rm -rf /var/lib/redis/*
  when: installed_version != redis_version

- name: Check if Redis is running
  shell: pgrep redis-server
  register: redis_running
  failed_when: false
  changed_when: false

- name: Start Redis if not running
  shell: |
    nohup /usr/local/bin/redis-server /etc/redis/redis.conf \
      > /var/log/redis/redis.log 2>&1 &
  async: 0
  poll: 0
  when: redis_running.rc != 0

- name: Flush handlers to apply restarts
  meta: flush_handlers

- name: Wait for Redis to start
  wait_for:
    port: "{{ redis_port }}"
    host: 127.0.0.1
    timeout: 30

- name: Verify Redis is running
  command: /usr/local/bin/redis-cli -p {{ redis_port }} ping
  register: redis_ping
  retries: 5
  delay: 2
  until: redis_ping.stdout == "PONG"
